name: 🛑 Stop Session

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which session to stop'
        required: true
        type: choice
        options:
          - 'vps'
          - 'code-server'
          - 'web-host'
          - 'ai-model'
          - 'all'
      save_data:
        description: 'Save data before stopping?'
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types: [stop_session]

permissions:
  contents: write
  actions: write

jobs:
  stop:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔄 Normalize Inputs
        run: |
          TARGET="${{ github.event.inputs.target }}"
          SAVE="${{ github.event.inputs.save_data }}"
          TARGET="${TARGET:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.target // "all"' 2>/dev/null)}"
          SAVE="${SAVE:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.save_data // "true"' 2>/dev/null)}"
          TARGET="${TARGET:-all}"
          SAVE="${SAVE:-true}"
          echo "target=$TARGET" >> $GITHUB_ENV
          echo "save_data=$SAVE" >> $GITHUB_ENV
          echo "🎯 Stopping: $TARGET | Save data: $SAVE"

      - name: "📨 Notify: Stopping Session"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "stop" \
            "🛑 Stopping ${{ env.target }} session" \
            "Shutting down the ${{ env.target }} session now...\n💾 Save data: ${{ env.save_data }}" \
            "15105570"

      - name: 🛑 Cancel Running Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TARGET="${{ env.target }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🛑  STOPPING SESSION: ${TARGET}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Map target to workflow file names
          declare -A WF_MAP
          WF_MAP[vps]="vps.yml"
          WF_MAP[code-server]="code-server.yml"
          WF_MAP[web-host]="web-host.yml"
          WF_MAP[ai-model]="ai-model.yml"

          CANCELLED=0

          # Build list of workflows to cancel
          WF_FILES=()
          if [ "$TARGET" = "all" ]; then
            for key in "${!WF_MAP[@]}"; do
              WF_FILES+=("${WF_MAP[$key]}")
            done
          else
            WF_FILES+=("${WF_MAP[$TARGET]}")
          fi

          for WF_FILE in "${WF_FILES[@]}"; do
            WF_NAME=$(basename "$WF_FILE" .yml)
            echo ""
            echo "🔍 Checking workflow: $WF_NAME ($WF_FILE)"

            # Use GitHub API directly via curl (gh CLI may not be available)
            # Get workflow ID from file name
            WF_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/actions/workflows" \
              | jq -r ".workflows[] | select(.path == \".github/workflows/$WF_FILE\") | .id" 2>/dev/null)

            if [ -z "$WF_ID" ]; then
              echo "   ⚠️  Workflow not found, trying by name..."
              WF_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows" \
                | jq -r ".workflows[] | select(.name | test(\"$WF_NAME\"; \"i\")) | .id" 2>/dev/null)
            fi

            if [ -z "$WF_ID" ]; then
              echo "   ⚠️  Could not find workflow ID, skipping"
              continue
            fi

            echo "   Workflow ID: $WF_ID"

            # Get in_progress runs
            for STATUS in "in_progress" "queued" "waiting"; do
              RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/$WF_ID/runs?status=$STATUS&per_page=10" \
                | jq -r '.workflow_runs[]?.id' 2>/dev/null || true)

              if [ -z "$RUNS" ]; then
                echo "   No $STATUS runs"
                continue
              fi

              for RUN_ID in $RUNS; do
                if [ -n "$RUN_ID" ]; then
                  echo "   Cancelling run $RUN_ID ($STATUS)..."
                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                    -H "Authorization: token $GH_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/cancel")
                  if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "204" ]; then
                    echo "   ✅ Cancelled! (HTTP $HTTP_CODE)"
                    CANCELLED=$((CANCELLED + 1))
                  else
                    echo "   ⚠️  Cancel returned HTTP $HTTP_CODE"
                  fi
                fi
              done
            done
          done

          # Also scan ALL running workflows by name pattern (catches anything missed)
          echo ""
          echo "🔍 Scanning all active runs for matching names..."
          ALL_RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/actions/runs?status=in_progress&per_page=50" \
            | jq -r '.workflow_runs[]? | "\(.id)|\(.name)|\(.status)"' 2>/dev/null || true)

          QUEUED_RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/actions/runs?status=queued&per_page=50" \
            | jq -r '.workflow_runs[]? | "\(.id)|\(.name)|\(.status)"' 2>/dev/null || true)

          WAITING_RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/actions/runs?status=waiting&per_page=50" \
            | jq -r '.workflow_runs[]? | "\(.id)|\(.name)|\(.status)"' 2>/dev/null || true)

          # Build name patterns to match
          if [ "$TARGET" = "all" ]; then
            PATTERNS="VPS|Code.Server|Web.Host|AI.Model"
          elif [ "$TARGET" = "vps" ]; then
            PATTERNS="VPS"
          elif [ "$TARGET" = "code-server" ]; then
            PATTERNS="Code.Server"
          elif [ "$TARGET" = "web-host" ]; then
            PATTERNS="Web.Host"
          elif [ "$TARGET" = "ai-model" ]; then
            PATTERNS="AI.Model"
          else
            PATTERNS="$TARGET"
          fi

          for RUN_LINE in $ALL_RUNS $QUEUED_RUNS $WAITING_RUNS; do
            if [ -z "$RUN_LINE" ]; then continue; fi
            RUN_ID=$(echo "$RUN_LINE" | cut -d'|' -f1)
            RUN_NAME=$(echo "$RUN_LINE" | cut -d'|' -f2)
            RUN_STATUS=$(echo "$RUN_LINE" | cut -d'|' -f3)

            # Skip our own stop workflow
            if echo "$RUN_NAME" | grep -qi "stop"; then continue; fi

            if echo "$RUN_NAME" | grep -qiE "$PATTERNS"; then
              echo "   Cancelling: $RUN_NAME (ID: $RUN_ID, Status: $RUN_STATUS)..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/cancel")
              if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "204" ]; then
                echo "   ✅ Cancelled! (HTTP $HTTP_CODE)"
                CANCELLED=$((CANCELLED + 1))
              else
                echo "   ⚠️  Cancel returned HTTP $HTTP_CODE"
              fi
            fi
          done

          # Also cancel any extend workflows that may be running
          echo ""
          echo "🔍 Checking extend workflows..."
          for RUN_LINE in $ALL_RUNS $QUEUED_RUNS $WAITING_RUNS; do
            if [ -z "$RUN_LINE" ]; then continue; fi
            RUN_ID=$(echo "$RUN_LINE" | cut -d'|' -f1)
            RUN_NAME=$(echo "$RUN_LINE" | cut -d'|' -f2)
            if echo "$RUN_NAME" | grep -qi "extend"; then
              echo "   Cancelling extend: $RUN_NAME (ID: $RUN_ID)..."
              curl -s -o /dev/null -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/cancel" 2>/dev/null || true
            fi
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Stop signal sent!"
          if [ "$CANCELLED" -gt 0 ]; then
            echo "  🛑 Cancelled $CANCELLED workflow run(s)"
          else
            echo "  ℹ️  No active runs found (may have already ended)"
          fi
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: "📨 Notify: Session Stopped"
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "end" \
            "🛑 ${{ env.target }} session stopped" \
            "The ${{ env.target }} session has been terminated.\n💾 Data was preserved on the runner's final cleanup." \
            "15105570"
