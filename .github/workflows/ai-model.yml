name: 🤖 AI Model (Gemma)

on:
  workflow_dispatch:
    inputs:
      model:
        description: '🤖 Gemma model to run'
        required: false
        default: 'gemma3:1b'
        type: choice
        options:
          # ── Gemma 4 (Latest) ──
          - 'gemma4:e2b'
          - 'gemma4:e4b'
          - 'gemma4:26b'
          - 'gemma4:31b'
          # ── Gemma 3n (On-device) ──
          - 'gemma3n:e2b'
          - 'gemma3n:e4b'
          # ── Gemma 3 ──
          - 'gemma3:270m'
          - 'gemma3:1b'
          - 'gemma3:4b'
          - 'gemma3:12b'
          - 'gemma3:27b'
          # ── Gemma 2 ──
          - 'gemma2:2b'
          - 'gemma2:9b'
          - 'gemma2:27b'
          # ── Gemma 1 ──
          - 'gemma:2b'
          - 'gemma:7b'
          # ── CodeGemma (Code) ──
          - 'codegemma:2b'
          - 'codegemma:7b'
          # ── ShieldGemma (Safety) ──
          - 'shieldgemma:2b'
          - 'shieldgemma:9b'
          - 'shieldgemma:27b'
          # ── RecurrentGemma (Efficient) ──
          - 'recurrentgemma:2b'
          - 'recurrentgemma:9b'
          - 'recurrentgemma:27b'
          # ── PaliGemma (Vision/Multimodal) ──
          - 'paligemma:3b'
          - 'paligemma:10b'
          - 'paligemma:22b'
      password:
        description: '🔒 Chat UI password (min 6 chars, or leave blank for auto)'
        required: false
        default: ''
        type: string
      duration:
        description: 'Session duration in minutes (max 30)'
        required: false
        default: '30'
        type: string
      tunnel:
        description: '🌐 Tunnel method'
        required: false
        default: 'cloudflare'
        type: choice
        options:
          - 'cloudflare'
          - 'localhost'
      storage:
        description: '💾 Storage mode'
        required: false
        default: 'github-only'
        type: choice
        options:
          - 'github-only'
          - 'auto'
          - 'drive-only'
  repository_dispatch:
    types: [start_ai_model]

permissions:
  contents: write

concurrency:
  group: ai-model
  cancel-in-progress: false

jobs:
  ai-model:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── KILL STALE OLLAMA ON PORT 11434 ──────────────────────
      - name: 🔓 Free Port 11434
        run: |
          echo "🔧 Ensuring port 11434 is free..."
          sudo pkill -9 -f ollama 2>/dev/null || true
          sleep 1
          PORT_PID=$(sudo lsof -ti:11434 2>/dev/null || true)
          if [ -n "$PORT_PID" ]; then
            echo "   Killing process $PORT_PID on port 11434..."
            sudo kill -9 $PORT_PID 2>/dev/null || true
            sleep 1
          fi
          echo "   ✅ Port 11434 is free"

      # ── NORMALIZE INPUTS ──────────────────────────────────────
      - name: 🔄 Normalize Inputs
        id: inputs
        run: |
          MODEL="${{ github.event.inputs.model }}"
          PASSWORD="${{ github.event.inputs.password }}"
          DURATION="${{ github.event.inputs.duration }}"
          TUNNEL="${{ github.event.inputs.tunnel }}"
          STORAGE="${{ github.event.inputs.storage }}"

          MODEL="${MODEL:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.model // "gemma3:1b"' 2>/dev/null)}"
          PASSWORD="${PASSWORD:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.password // empty' 2>/dev/null)}"
          DURATION="${DURATION:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.duration // "30"' 2>/dev/null)}"
          TUNNEL="${TUNNEL:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.tunnel // "cloudflare"' 2>/dev/null)}"
          STORAGE="${STORAGE:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.storage // "github-only"' 2>/dev/null)}"

          DURATION="${DURATION:-30}"
          MODEL="${MODEL:-gemma3:1b}"
          TUNNEL="${TUNNEL:-cloudflare}"
          STORAGE="${STORAGE:-github-only}"

          echo "model=$MODEL" >> $GITHUB_ENV
          echo "password=$PASSWORD" >> $GITHUB_ENV
          echo "duration=$DURATION" >> $GITHUB_ENV
          echo "tunnel=$TUNNEL" >> $GITHUB_ENV
          echo "storage=$STORAGE" >> $GITHUB_ENV

          echo "✅ Inputs: Model=$MODEL | Duration=${DURATION}min | Tunnel=$TUNNEL"

      # ── NOTIFICATIONS ────────────────────────────────────────
      - name: "📨 Notify: AI Model Starting"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "start" \
            "🤖 AI Model Starting" \
            "Setting up AI inference server...\n🤖 Model: $MODEL\n⏱️ Duration: ${DURATION} min" \
            "3447003"

      # ── CACHE ────────────────────────────────────────────────
      - name: ⚡ Cache AI Model Packages
        id: ai-cache
        uses: actions/cache@v4
        with:
          path: /tmp/ai-cache
          key: ai-packages-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ai-packages-v2-${{ runner.os }}-

      # ── RESTORE DATA ─────────────────────────────────────────
      - name: ♻️ Restore AI Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_REMOTE: ${{ vars.RCLONE_REMOTE }}
          STORAGE_MODE: ${{ env.storage }}
          DATA_BRANCH: ai-data
          RELEASE_TAG: ai-data
        run: |
          chmod +x scripts/restore-data.sh
          bash scripts/restore-data.sh

      # ── INSTALL AI MODEL ────────────────────────────────────
      - name: 🤖 Install AI Model Environment
        run: |
          if [ "${{ steps.ai-cache.outputs.cache-hit }}" = "true" ]; then
            echo "⚡ Cache hit! Fast install..."
          else
            echo "📦 Cache miss — full install..."
          fi
          chmod +x scripts/setup-ai-model.sh
          bash scripts/setup-ai-model.sh "$MODEL"

      - name: 💾 Save Cache (first run)
        if: steps.ai-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ai-cache
          key: ai-packages-v2-${{ runner.os }}-${{ github.run_id }}

      # ── RESTORE AI FILES ───────────────────────────────────
      - name: ♻️ Restore AI Chat Data
        run: |
          if [ -d /tmp/restore-data ]; then
            sudo mkdir -p /home/runner/ai-data
            sudo cp -a /tmp/restore-data/ai-data /home/runner/ 2>/dev/null || true
            sudo mkdir -p /home/runner/.ollama
            sudo cp -a /tmp/restore-data/.ollama/modelfile /home/runner/.ollama/ 2>/dev/null || true
            sudo chown -R runner:runner /home/runner/ai-data /home/runner/.ollama 2>/dev/null || true
            echo "✅ AI chat data restored"
          else
            sudo mkdir -p /home/runner/ai-data
          fi

      # ── START AI MODEL SERVER ───────────────────────────────
      - name: 🚀 Start AI Model Server
        env:
          AI_PASSWORD: ${{ env.password }}
          AI_MODEL: ${{ env.model }}
        run: |
          chmod +x scripts/start-ai-model.sh
          bash scripts/start-ai-model.sh "$AI_MODEL" "$AI_PASSWORD"

      # ── TUNNEL ───────────────────────────────────────────────
      - name: ☁️ Cloudflare Tunnel
        if: env.tunnel == 'cloudflare'
        run: |
          chmod +x scripts/tunnel-cloudflare.sh
          bash scripts/tunnel-cloudflare.sh 11435

      - name: 🌐 localhost.run Tunnel
        if: env.tunnel == 'localhost'
        run: |
          chmod +x scripts/tunnel-localhost.sh
          bash scripts/tunnel-localhost.sh 11435

      # ── READY ────────────────────────────────────────────────
      - name: ✅ AI Model is Ready
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="${TUNNEL_URL:-https://pending.trycloudflare.com}"
          PASS="${AI_PASSWORD:-$(cat /tmp/ai-password.txt 2>/dev/null || echo 'see-logs')}"
          OLLAMA_URL="${URL}"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🤖  YOUR AI MODEL IS NOW RUNNING!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🤖 Model:     $MODEL"
          echo "  🔗 Chat URL:  ${URL}/"
          echo "  🔌 API URL:   ${URL}/api (Ollama-compatible)"
          echo "  🔑 Password:  $PASS"
          echo "  ⏱️  Session:   ${DURATION} minutes"
          echo ""
          echo "  💡 API Example:"
          echo "      curl ${URL}/api/generate -d '{\"model\":\"$MODEL\",\"prompt\":\"Hello!\"}'"
          echo ""
          echo "  💡 Extend: Run 'Extend Session' or send a dispatch!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "::notice::🤖 AI Model READY! → ${URL}/ | Model: $MODEL | Password: $PASS"

          chmod +x scripts/notify.sh
          bash scripts/notify.sh "ready" \
            "🤖 AI Model is Ready!" \
            "🔗 [Open Chat](${URL}/)\n🤖 Model: \`${MODEL}\`\n🔑 Password: \`${PASS}\`\n⏱️ Duration: ${DURATION} min" \
            "3066993"

      # ── KEEPALIVE ────────────────────────────────────────────
      - name: 🔄 Keepalive (Session Timer)
        run: |
          chmod +x scripts/keepalive-ai.sh
          bash scripts/keepalive-ai.sh "$DURATION"

      # ── SAVE DATA ────────────────────────────────────────────
      - name: 💾 Save AI Data
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_REMOTE: ${{ vars.RCLONE_REMOTE }}
          STORAGE_MODE: ${{ env.storage }}
          DATA_BRANCH: ai-data
          RELEASE_TAG: ai-data
          RUNNER_HOME: /home/runner
        run: |
          chmod +x scripts/save-ai-data.sh
          bash scripts/save-ai-data.sh

      - name: "📨 Notify: AI Session Ended"
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "end" \
            "🤖 AI Model Session Ended" \
            "Your AI model session is over.\n💾 Data saved to \`ai-data\` branch.\n🔄 Run the workflow again to resume." \
            "15105570"

      # ── CLEANUP ──────────────────────────────────────────────
      - name: 🧹 Cleanup
        if: always()
        run: |
          sudo pkill -f ollama 2>/dev/null || true
          sudo pkill -f "python3.*ai-chat" 2>/dev/null || true
          sudo pkill -f cloudflared 2>/dev/null || true
