name: 💻 Code-Server (Browser VS Code)

on:
  workflow_dispatch:
    inputs:
      password:
        description: '🔒 Code-server password (min 6 chars, or leave blank for auto)'
        required: false
        default: ''
        type: string
      duration:
        description: 'Session duration in minutes (max 30)'
        required: false
        default: '30'
        type: string
      tunnel:
        description: '🌐 Tunnel method'
        required: false
        default: 'cloudflare'
        type: choice
        options:
          - 'cloudflare'
          - 'localhost'
      storage:
        description: '💾 Storage mode'
        required: false
        default: 'github-only'
        type: choice
        options:
          - 'github-only'
          - 'auto'
          - 'drive-only'
      clone_repo:
        description: '📦 Repo URL to clone (optional, for your project)'
        required: false
        default: ''
        type: string
      install_ai_tools:
        description: '🤖 Install AI CLI tools in code-server (Gemini CLI, OpenCode/Claude Code, Codex CLI)'
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types: [start_codeserver]

permissions:
  contents: write

concurrency:
  group: code-server
  cancel-in-progress: false

jobs:
  code-server:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      DISPLAY: :0

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── NORMALIZE INPUTS ──────────────────────────────────────
      - name: 🔄 Normalize Inputs
        id: inputs
        run: |
          PASSWORD="${{ github.event.inputs.password }}"
          DURATION="${{ github.event.inputs.duration }}"
          TUNNEL="${{ github.event.inputs.tunnel }}"
          STORAGE="${{ github.event.inputs.storage }}"
          CLONE_REPO="${{ github.event.inputs.clone_repo }}"
          INSTALL_AI_TOOLS="${{ github.event.inputs.install_ai_tools }}"

          PASSWORD="${PASSWORD:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.password // empty' 2>/dev/null)}"
          DURATION="${DURATION:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.duration // "30"' 2>/dev/null)}"
          TUNNEL="${TUNNEL:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.tunnel // "cloudflare"' 2>/dev/null)}"
          STORAGE="${STORAGE:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.storage // "github-only"' 2>/dev/null)}"
          CLONE_REPO="${CLONE_REPO:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.clone_repo // empty' 2>/dev/null)}"
          INSTALL_AI_TOOLS="${INSTALL_AI_TOOLS:-$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.install_ai_tools // "true"' 2>/dev/null)}"

          DURATION="${DURATION:-30}"
          TUNNEL="${TUNNEL:-cloudflare}"
          STORAGE="${STORAGE:-github-only}"
          INSTALL_AI_TOOLS="${INSTALL_AI_TOOLS:-true}"

          echo "password=$PASSWORD" >> $GITHUB_ENV
          echo "duration=$DURATION" >> $GITHUB_ENV
          echo "tunnel=$TUNNEL" >> $GITHUB_ENV
          echo "storage=$STORAGE" >> $GITHUB_ENV
          echo "clone_repo=$CLONE_REPO" >> $GITHUB_ENV
          echo "install_ai_tools=$INSTALL_AI_TOOLS" >> $GITHUB_ENV

          echo "✅ Inputs: Duration=${DURATION}min | Tunnel=$TUNNEL | Storage=$STORAGE | AI Tools=$INSTALL_AI_TOOLS"

      # ── NOTIFICATIONS ────────────────────────────────────────
      - name: "📨 Notify: Session Starting"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "start" \
            "💻 Code-Server Starting" \
            "Your browser VS Code is spinning up...\n⏱️ Duration: ${DURATION} min\n🌐 Tunnel: $TUNNEL" \
            "3447003"

      # ── CACHE ────────────────────────────────────────────────
      - name: ⚡ Cache Code-Server Packages
        id: cs-cache
        uses: actions/cache@v4
        with:
          path: /tmp/cs-cache
          key: cs-packages-v1-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cs-packages-v1-${{ runner.os }}-

      # ── RESTORE WORKSPACE DATA ───────────────────────────────
      - name: ♻️ Restore Workspace Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_REMOTE: ${{ vars.RCLONE_REMOTE }}
          STORAGE_MODE: ${{ env.storage }}
          DATA_BRANCH: code-server-data
          RELEASE_TAG: code-server-data
        run: |
          chmod +x scripts/restore-data.sh
          bash scripts/restore-data.sh

      # ── INSTALL CODE-SERVER ─────────────────────────────────
      - name: 💻 Install Code-Server
        run: |
          if [ "${{ steps.cs-cache.outputs.cache-hit }}" = "true" ]; then
            echo "⚡ Cache hit! Fast install..."
          else
            echo "📦 Cache miss — full install..."
          fi
          chmod +x scripts/setup-codeserver.sh
          bash scripts/setup-codeserver.sh

      # ── INSTALL AI CLI TOOLS ──────────────────────────────────
      - name: 🤖 Install AI CLI Tools
        if: env.install_ai_tools == 'true'
        run: |
          chmod +x scripts/setup-ai-cli-tools.sh
          bash scripts/setup-ai-cli-tools.sh

      - name: 💾 Save Cache (first run)
        if: steps.cs-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/cs-cache
          key: cs-packages-v1-${{ runner.os }}-${{ github.run_id }}

      # ── RESTORE WORKSPACE FILES ─────────────────────────────
      - name: ♻️ Restore Workspace Files
        run: |
          if [ -d /tmp/restore-data ]; then
            # Fixed: tar was created with -C /home/runner, so paths are relative (no /home/ prefix)
            sudo cp -a /tmp/restore-data/workspace /home/runner/ 2>/dev/null || true
            sudo mkdir -p /home/runner/.local/share
            sudo cp -a /tmp/restore-data/.local/share/code-server /home/runner/.local/share/code-server 2>/dev/null || true
            sudo mkdir -p /home/runner/.config
            sudo cp -a /tmp/restore-data/.config/code-server /home/runner/.config/code-server 2>/dev/null || true
            sudo cp -a /tmp/restore-data/.bashrc /home/runner/.bashrc 2>/dev/null || true
            sudo cp -a /tmp/restore-data/.gitconfig /home/runner/.gitconfig 2>/dev/null || true
            sudo cp -a /tmp/restore-data/.ssh /home/runner/.ssh 2>/dev/null || true
            sudo cp -a /tmp/restore-data/.profile /home/runner/.profile 2>/dev/null || true
            sudo chown -R runner:runner /home/runner/workspace /home/runner/.local/share/code-server /home/runner/.config/code-server 2>/dev/null || true
            echo "✅ Workspace files restored"
          else
            mkdir -p /home/runner/workspace
          fi

      # ── CLONE USER REPO (optional) ──────────────────────────
      - name: 📦 Clone User Repository
        if: env.clone_repo != ''
        run: |
          echo "📦 Cloning $clone_repo..."
          cd /home/runner/workspace
          git clone "$clone_repo" . 2>/dev/null || {
            echo "⚠️ Clone failed, repo might already have files"
          }
          sudo chown -R runner:runner /home/runner/workspace
          echo "✅ Repository cloned to workspace"

      # ── START CODE-SERVER ───────────────────────────────────
      - name: 🚀 Start Code-Server
        env:
          CS_PASSWORD: ${{ env.password }}
        run: |
          chmod +x scripts/start-codeserver.sh
          bash scripts/start-codeserver.sh "$CS_PASSWORD"

      # ── TUNNEL ───────────────────────────────────────────────
      - name: ☁️ Cloudflare Tunnel
        if: env.tunnel == 'cloudflare'
        run: |
          chmod +x scripts/tunnel-cloudflare.sh
          bash scripts/tunnel-cloudflare.sh 8080

      - name: 🌐 localhost.run Tunnel
        if: env.tunnel == 'localhost'
        run: |
          chmod +x scripts/tunnel-localhost.sh
          bash scripts/tunnel-localhost.sh 8080

      # ── READY ────────────────────────────────────────────────
      - name: ✅ Code-Server is Ready
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          URL="${TUNNEL_URL:-https://pending.trycloudflare.com}"
          PASS="${CS_PASSWORD:-$(cat /tmp/cs-password.txt 2>/dev/null || echo 'see-logs')}"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  💻  YOUR CODE-SERVER IS NOW RUNNING!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔗 URL:      ${URL}/"
          echo "  🔑 Password: $PASS"
          echo "  ⏱️  Session:  ${DURATION} minutes"
          echo "  📁 Workspace: /home/runner/workspace"
          echo ""
          echo "  💡 Extend: Run 'Extend Session' workflow or send a dispatch!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "::notice::💻 Code-Server READY! → ${URL}/ | Password: $PASS"

          chmod +x scripts/notify.sh
          bash scripts/notify.sh "ready" \
            "💻 Code-Server Ready!" \
            "🔗 [Open Code-Server](${URL}/)\n🔑 Password: \`${PASS}\`\n⏱️ Duration: ${DURATION} min\n📁 Workspace: /home/runner/workspace" \
            "3066993"

      # ── KEEPALIVE ────────────────────────────────────────────
      - name: 🔄 Keepalive (Session Timer)
        run: |
          chmod +x scripts/keepalive-codeserver.sh
          bash scripts/keepalive-codeserver.sh "$DURATION"

      # ── SAVE DATA ────────────────────────────────────────────
      - name: 💾 Save Workspace Data
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
          RCLONE_REMOTE: ${{ vars.RCLONE_REMOTE }}
          STORAGE_MODE: ${{ env.storage }}
          DATA_BRANCH: code-server-data
          RELEASE_TAG: code-server-data
          RUNNER_HOME: /home/runner
        run: |
          chmod +x scripts/save-codeserver-data.sh
          bash scripts/save-codeserver-data.sh

      - name: "📨 Notify: Session Ended"
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/notify.sh
          bash scripts/notify.sh "end" \
            "💻 Code-Server Session Ended" \
            "Your coding session is over.\n💾 Data saved to \`code-server-data\` branch.\n🔄 Run the workflow again to resume." \
            "15105570"

      # ── CLEANUP ──────────────────────────────────────────────
      - name: 🧹 Cleanup
        if: always()
        run: |
          sudo pkill -f code-server 2>/dev/null || true
          sudo pkill -f cloudflared 2>/dev/null || true
